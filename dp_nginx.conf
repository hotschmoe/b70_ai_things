# dp_nginx.conf -- round-robin proxy for the 2x data-parallel daily driver.
# Both backends serve the SAME model (one captured replica per B70); nginx balances the
# OpenAI-compatible HTTP API across the two cards. Public endpoint stays :18080, so Open WebUI
# and every app that hit the old single daily driver keep working unchanged.
worker_processes 1;
events { worker_connections 2048; }
http {
  upstream vllm_dp {
    least_conn;                                      # better than plain round-robin for variable-length LLM reqs
    server 127.0.0.1:18091 max_fails=2 fail_timeout=30s;   # replica 0 -> B70 card 0
    server 127.0.0.1:18092 max_fails=2 fail_timeout=30s;   # replica 1 -> B70 card 1
  }
  proxy_read_timeout 900s;                           # long generations
  proxy_send_timeout 900s;
  server {
    listen 18080;
    client_max_body_size 64m;
    location / {
      proxy_pass http://vllm_dp;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_buffering off;                           # stream SSE tokens to the client immediately
      proxy_cache off;
    }
  }
}
