# Round-robin proxy for the sglang woq int4 DP=2 daily driver (2 single-card replicas).
# Replicas publish to the host: card 0 -> :30000, card 1 -> :30001. nginx reaches them via the
# docker bridge gateway (172.17.0.1). Proxy listens on :18080. Wedge-proof: no cross-card collective.
worker_processes 1;
events { worker_connections 1024; }
http {
    upstream sglang_dp {
        server 172.17.0.1:30000 max_fails=2 fail_timeout=15s;
        server 172.17.0.1:30001 max_fails=2 fail_timeout=15s;
    }
    server {
        listen 18080;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        location / {
            proxy_pass http://sglang_dp;
            proxy_set_header Host $host;
        }
        location = /health { proxy_pass http://sglang_dp/health; }
    }
}
