# Quant matrix for the eval campaign. The orchestrator reads this to know:
#   - what served-model-id to send in API requests (vLLM's --served-model-name / model path)
#   - which serve script + env brings each one up on the box (for optional auto-cycling)
#   - which entry is the REFERENCE (the FP16/BF16 ceiling everything is scored against)
#
# IMPORTANT: confirm the served_model_id + serve flags against the box before a real run.
# vLLM answers /v1/models with the id it was served under — query it to be sure:
#   curl -s http://192.168.10.5:18080/v1/models | python3 -m json.tool
#
# ⚠️ RTN vs GPTQ MIX-UP GUARD: served_model_id MUST encode the calibration method (…-gptq / …-rtn),
#   never a bare 'qwen3-14b-w8a8' that could be either. Two checkpoints differing only by calibration
#   are a silent foot-gun -- serving the wrong one mislabels the result. This already bit the Tier-1
#   HumanEval+ 'w8a8' run (it served the RTN dup, not GPTQ). Less-performant dups live in models/archive/.
#
# Fields marked TODO need a human/box confirmation (paths, served names, exact serve env).

endpoint: http://192.168.10.5:18080/v1   # default; override per-run with --endpoint

defaults:
  # Determinism knobs applied to every graded request (see README §5/§7).
  temperature: 0.0
  top_p: 1.0
  seed: 1234
  max_tokens: 2048
  concurrency: 1        # eval at 1 for reproducibility; raise only for throughput, never for graded runs

# The first campaign: Qwen3-14B across quants. 'reference: true' marks the ceiling.
# Serve commands are what was ACTUALLY used (2026-06-19); all on vLLM 0.23.0-based images for parity.
# One card -> one model at a time (each serve script evicts the others off port 18080).
models:
  - label: bf16
    reference: true
    served_model_id: qwen3-14b
    family: qwen3-14b
    weights: bf16
    activations: bf16
    serve_cmd: "scripts/runremote.sh scripts/36_serve.sh QUANT=none SERVED=qwen3-14b IMG=vllm-xpu-env:v0230 EXTRA='--cpu-offload-gb 8' MAXLEN=4096"
    notes: "REFERENCE ceiling, but ~29.6 GB BF16 does NOT fit one 32 GB card under the v1 engine
      (No available memory for cache blocks). Needs --cpu-offload-gb (slow but ok for scoring) OR
      compute the bf16 reference offline on CPU. Anchor on fp8 until then. src specula-build/models/Qwen3-14B."

  - label: fp8
    served_model_id: qwen3-14b-fp8
    family: qwen3-14b
    weights: fp8
    activations: fp8
    serve_cmd: "scripts/runremote.sh scripts/36_serve.sh QUANT=fp8 SERVED=qwen3-14b-fp8 IMG=vllm-xpu-env:v0230 MAXLEN=4096 MAXSEQS=4"
    notes: "Online FP8 (upstream XPU FP8 kernel). ~15 GB, near-lossless. Practical high-precision anchor."

  - label: w8a8
    served_model_id: qwen3-14b-w8a8-gptq    # SmoothQuant+GPTQ@128 (calibrated winner). RTN dup is in models/archive/.
    family: qwen3-14b
    weights: int8
    activations: int8-dynamic-per-token
    calibration: smoothquant+gptq@128       # NOT rtn -> served from models/Qwen3-14B-W8A8-gptq
    serve_cmd: "scripts/runremote.sh scripts/51_serve_int8_specdecode.sh IMG=vllm-xpu-env:int8 SPEC=0 GRAPH=0 MAXLEN=4096"
    notes: "Our int8 kernel (Selected XPUInt8ScaledMMLinearKernel). FP8 KV. Plain eager for determinism.
      ⚠️ The earlier Tier-1 HumanEval+ 'w8a8' result (served_model_id qwen3-14b-w8a8) was the RTN dup -- RE-RUN on this gptq id."

  - label: w4a8
    served_model_id: qwen3-14b-w4a8
    family: qwen3-14b
    weights: int4
    activations: int8-dynamic-per-token
    serve_cmd: "scripts/runremote.sh scripts/36_serve.sh QUANT=/models/Qwen3-14B-W4A8-INT SERVED=qwen3-14b-w4a8 IMG=vllm-xpu-env:int8 MAXLEN=4096 MAXSEQS=4"
    notes: "XPUW4A8IntLinearKernel. Smallest footprint (~9.3 GB). compressed-tensors int4-w/int8-a."

  # --- created later this session with scripts/54 (the MISSING formats) ---
  # w4a16 / w8a16: quantize with scripts/54 SCHEME=W4A16|W8A16, THEN test XPU serveability (kernel
  # coverage unknown -> a finding either way). Do NOT relabel w4a8 as w4a16; they are different schemes.
