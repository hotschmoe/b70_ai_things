#   Qwen/Qwen3-0.6B                  (hf) -- tiny prior-gen, off-target
#   deepreinforce-ai/Ornith-1.0-35B  (hf) -- 35B finetune, off-target
#   Qwen3-14B-W4A16-gptq             (custom) -- prior-gen Qwen3 14B scaffold, NOT on HF
#   Qwen3-14B-W4A8-gptq-prepacked    (custom) -- prior-gen Qwen3 14B scaffold, NOT on HF
#   Qwen3-14B-W8A8-autoround         (custom) -- prior-gen Qwen3 14B scaffold, NOT on HF
#   Qwen3.6-27B-W4A16-awq-repack     (custom) -- AWQ-probe experiment, superseded
